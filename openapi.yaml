openapi: 3.0.3
info:
  title: TCSS 460 — Group 3 API
  description: |
    **Team:** Group 3

    Backend API for the TCSS 460 group project. Use **GET /heartbeat** to confirm the service is reachable (no auth, no database).

    **Live deployment:** See the Production entry under `servers`. If your host differs, update that URL in this file so `/api-docs` stays accurate.
  version: 0.1.0

servers:
  - url: https://group-project-backend-group-3-1.onrender.com
    description: Deployed server on Render
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Heartbeat
    description: HTTP request to verify server is alive
  - name: Movies
    description: Movie endpoints
  - name: Shows
    description: TV show endpoints

paths:
  /heartbeat:
    get:
      tags: [Heartbeat]
      summary: GET heartbeat status
      description: Returns a message declaring that the server is alive
      responses:
        '200':
          description: A greeting message
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: 'The server is alive and running.'
                    description: Human-readable confirmation that the server responded successfully.

  /movies:
    get:
      tags: [Movies]
      summary: Search movies by title
      description: |
        Search for movies by title. Returns a list of matches or a message if no results are found.
      parameters:
        - name: title
          in: query
          required: true
          description: Movie title (or fragment) passed to TMDB as the search query.
          schema:
            type: string
            example: matrix
      responses:
        '200':
          description: |
            A list of matching movies, or an object with a message if no results are found.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      type: object
                      required: [title, releaseDate, description, id]
                      properties:
                        title:
                          type: string
                          example: The Matrix
                        poster:
                          type: string
                          nullable: true
                          example: /f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg
                        releaseDate:
                          type: string
                          example: '1999-03-31'
                        description:
                          type: string
                        id:
                          type: integer
                          example: 603
                  - type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: 'No movies found with title: nothing'
        '400':
          description: Missing required `title` query parameter.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: Title is required
        '401':
          description: Unauthorized request to external movie service.
          content:
            application/json:
              schema:
                type: object
                required: [status, error]
                properties:
                  status:
                    type: string
                    example: 'Unauthorized - 401'
                  error:
                    type: string
                    example: TMDB API error
        '404':
          description: Requested resource was not found.
          content:
            application/json:
              schema:
                type: object
                required: [status, error]
                properties:
                  status:
                    type: string
                    example: 'Not Found - 404'
                  error:
                    type: string
                    example: TMDB API error
        default:
          description: |
            An error occurred while fetching movie data.
          content:
            application/json:
              schema:
                type: object
                required: [status, error]
                properties:
                  status:
                    type: string
                  error:
                    type: string
                    example: TMDB API error
        '500':
          description: Server configuration error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB token is not configured
        '502':
          description: Failed to retrieve data from external service.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach TMDB service

  /movies/{id}:
    get:
      tags: [Movies]
      summary: Get movie details by ID
      description: |
        Retrieve detailed information about a specific movie using its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: TMDB movie ID.
          schema:
            type: integer
            example: 550
      responses:
        '200':
          description: Detailed information about the requested movie.
          content:
            application/json:
              schema:
                type: object
                required: [title, release_date, overview, revenue, runtime, budget]
                properties:
                  title:
                    type: string
                    example: Fight Club
                  poster_path:
                    type: string
                    nullable: true
                  release_date:
                    type: string
                    example: '1999-10-15'
                  overview:
                    type: string
                  revenue:
                    type: number
                    example: 100853753
                  runtime:
                    type: integer
                    example: 139
                  budget:
                    type: number
                    example: 63000000
        '400':
          description: Missing or invalid movie ID.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: ID required
        '401':
          description: Authentication failed or external service access was denied.
          content:
            application/json:
              schema:
                type: object
                required: [status, error]
                properties:
                  status:
                    type: string
                    example: 'Unauthorized - 401'
                  error:
                    type: string
                    example: TMDB API error
        '404':
          description: The requested movie was not found.
          content:
            application/json:
              schema:
                type: object
                required: [status, error]
                properties:
                  status:
                    type: string
                    example: 'Not Found - 404'
                  error:
                    type: string
                    example: TMDB API error
        default:
          description: |
            An unexpected error occurred while processing the request.
          content:
            application/json:
              schema:
                type: object
                required: [status, error]
                properties:
                  status:
                    type: string
                  error:
                    type: string
                    example: TMDB API error
        '500':
          description: Server configuration error. Required service credentials are missing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB token is not configured
        '502':
          description: Failed to retrieve data from external service.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach TMDB service

  /movies/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: Returns top 10 popular movies in English from a transformed backend schema.
      responses:
        '200':
          description: Popular movie list.
          content:
            application/json:
              schema:
                type: object
                required: [count, results]
                properties:
                  count:
                    type: integer
                    example: 10
                  results:
                    type: array
                    items:
                      type: object
                      required: [movieId]
                      properties:
                        movieId:
                          type: integer
                          example: 603
        '500':
          description: Missing TMDB token configuration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB token is not configured
        '502':
          description: Upstream TMDB call failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach TMDB service

  /shows:
    get:
      tags: [Shows]
      summary: Search TV shows by title
      description: |
        Searches TV series using **The Movie Database (TMDB)** [Search TV endpoint](https://developer.themoviedb.org/reference/search-tv)
        (`GET /3/search/tv`). The backend returns **only the first page** of TMDB results (TMDB default page size applies; the API does not expose a `page` query parameter).

        **Upstream authentication (server configuration, not sent by API clients):**

        - **`TMDB_BEARER_TOKEN`** — If set, requests use `Authorization: Bearer <token>` (v4 read access token or compatible bearer).
        - **`TMDB_API_KEY`** — If no bearer token is set, the v3 API key is appended to the TMDB URL as `api_key`.

        At least one of these must be configured or the endpoint responds with `500`.

        **Response shape:** Each item maps TMDB fields to a stable JSON schema: series `name` → `title`, `poster_path` → full `posterImage` URL (`https://image.tmdb.org/t/p/w500` + path, or `null` if missing), `first_air_date` → `releaseDate`, `overview` → `shortDescription`, and `genre_ids` → `genreIds`. When TMDB returns no rows, the response is an empty JSON array (`[]`).
      parameters:
        - name: title
          in: query
          required: true
          description: |
            TV show title or fragment. Passed to TMDB as the `query` parameter after trimming; special characters are URL-encoded.
          schema:
            type: string
            minLength: 1
            example: invincible
      responses:
        '200':
          description: |
            First page of matching TV shows as a simplified list. Empty list if TMDB has no matches (not an error).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShowSearchResult'
              examples:
                sample:
                  summary: Example search hits
                  value:
                    - id: 95557
                      title: Invincible
                      posterImage: https://image.tmdb.org/t/p/w500/yDWJYRAfMNu9y2A0jN0aYf6APmn.jpg
                      releaseDate: '2021-03-26'
                      shortDescription: Teenage son of the most powerful superhero on the planet.
                      genreIds: [16, 10765, 9648]
        '400':
          description: Missing `title`, or `title` is empty/whitespace after string conversion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                missingTitle:
                  value:
                    error: Query parameter title is required
        '500':
          description: |
            Server or upstream failure: TMDB credentials missing, TMDB returned a non-success HTTP status, or the outbound request failed (network/timeout).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                noAuth:
                  summary: No TMDB_BEARER_TOKEN or TMDB_API_KEY
                  value:
                    error: TMDB authentication is not configured
                tmdbHttp:
                  summary: TMDB rejected the request or returned an error status
                  value:
                    error: TMDB API error
                network:
                  summary: Fetch failed before a response was received
                  value:
                    error: Failed to reach TMDB service

  /shows/{id}:
    get:
      tags: [Shows]
      summary: Get TV show details by ID
      description: Retrieve detailed information about a specific TV show using its ID if it exists within the TMDB database.
      parameters:
        - name: id
          in: path
          required: true
          description: The TV show ID based on TMDB.
      responses:
        '200':
          description: Detailed information about the requested TV show.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailedShowResult'
        '400':
          description: Show ID is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                missingId:
                  value:
                    error: ID required
        '500':
          description: |
            Server or upstream failure: TMDB credentials missing, TMDB returned a non-success HTTP status, or the outbound request failed (network/timeout).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                noAuth:
                  summary: No TMDB_BEARER_TOKEN or TMDB_API_KEY


  /shows/popular:
    get:
      tags: [Shows]
      summary: Get popular TV shows
      description: Returns top 10 popular TV shows in English from a transformed backend schema.
      responses:
        '200':
          description: Popular show list.
          content:
            application/json:
              schema:
                type: object
                required: [count, results]
                properties:
                  count:
                    type: integer
                    example: 10
                  results:
                    type: array
                    items:
                      type: object
                      required: [showId]
                      properties:
                        showId:
                          type: integer
                          example: 1399
        '500':
          description: Missing TMDB token configuration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB token is not configured
        '502':
          description: Upstream TMDB call failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to reach TMDB service

components:

  schemas:
    ErrorMessage:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message from this API.

    ShowSearchResult:
      type: object
      description: One TV series match after normalization for clients.
      required: [id, title, posterImage, releaseDate, shortDescription, genreIds]
      properties:
        id:
          type: integer
          description: TMDB TV series id (`tv_id`).
          example: 95557
        title:
          type: string
          description: Series title (from TMDB `name`).
          example: Invincible
        posterImage:
          type: string
          nullable: true
          description: |
            Full poster URL (`w500` width) or `null` when TMDB has no `poster_path`.
          example: https://image.tmdb.org/t/p/w500/yDWJYRAfMNu9y2A0jN0aYf6APmn.jpg
        releaseDate:
          type: string
          description: First air date (from TMDB `first_air_date`, ISO `YYYY-MM-DD` when present; may be empty).
          example: '2021-03-26'
        shortDescription:
          type: string
          description: Overview / synopsis (from TMDB `overview`).
        genreIds:
          type: array
          description: TMDB genre id list (`genre_ids`).
          items:
            type: integer
          example: [16, 10765, 9648]

    DetailedShowResult:
      type: object
      description: One TV series match after normalization for clients.
      required: [title, id, overview, creators, genres, poster, releaseDate, numberOfEpisodes, numberOfSeasons]
      properties:
        title:
          type: integer
          description: TMDB TV series id (`tv_id`).
          example: 95557
        id:
          type: string
          description: Series title (from TMDB `name`).
          example: Invincible
        overview:
          type: string
          description: Overview / synopsis (from TMDB `overview`).
          example: Teenage son of the most powerful superhero on the planet.
        creators:
          type: array
          description: List of creators (from TMDB `created_by`).
          example: [Kevin Lam, Christian De Dios]
        genres:
          type: array
          description: TMDB genre id list (`genre_ids`).
          items:
            type: integer, string
          example: [ 16, 10765, 9648 ]
        poster:
          type: string
          nullable: true
          description: |
            Full poster URL (`w500` width) or `null` when TMDB has no `poster_path`.
          example: https://image.tmdb.org/t/p/w500/yDWJYRAfMNu9y2A0jN0aYf6APmn.jpg
        releaseDate:
          type: string
          description: First air date (from TMDB `first_air_date`, ISO `YYYY-MM-DD` when present; may be empty).
          example: '2021-03-26'
        numberOfEpisodes:
          type: integer
          description: Number of episodes in the series.
          example: 12
        numberOfSeasons:
          type: integer
          description: Number of seasons in the series.
          example: 2



