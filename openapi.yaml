openapi: 3.0.3
info:
  title: TCSS 460 — Group 3 API
  description: |
    **Team:** Group 3

    Backend API for the TCSS 460 group project. Use **GET /heartbeat** to confirm the service is reachable (no auth, no database).

    **Live deployment:** See the Production entry under `servers`. If your host differs, update that URL in this file so `/api-docs` stays accurate.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://group-project-backend-group-3-1.onrender.com

    description: Deployed server on Render

tags:
  - name: Heartbeat
    description: HTTP request to verify server is alive

paths:
  /heartbeat:
    get:
      tags: [Heartbeat]
      summary: GET heartbeat status
      description: Returns a message declaring that the server is alive
      responses:
        '200':
          description: A greeting message
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: 'The server is alive and running.'
                    description: Human-readable confirmation that the server responded successfully.
